<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Result — Car Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 22px; margin-bottom: 20px; color: #111; }

    .img-wrap {
      text-align: center;
      margin-bottom: 20px;
    }
    .img-wrap img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .result-block {
      background: #f8faff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .predicted-label { font-size: 11px; color: #888; text-transform: uppercase;
                       letter-spacing: 0.5px; margin-bottom: 4px; }
    .predicted-name  { font-size: 24px; font-weight: 700; color: #1e3a8a; }
    .confidence      { font-size: 13px; color: #555; margin-top: 4px; }

    .top3-title {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .bar-row { margin-bottom: 12px; }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
      color: #333;
    }
    .bar-track {
      background: #f0f0f0;
      border-radius: 6px;
      height: 8px;
    }
    .bar-fill {
      height: 8px;
      border-radius: 6px;
      background: #2563eb;
      transition: width 0.4s ease;
    }
    .bar-row:nth-child(2) .bar-fill { background: #60a5fa; }
    .bar-row:nth-child(3) .bar-fill { background: #bfdbfe; }

    .back-btn {
      display: block;
      text-align: center;
      padding: 11px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-top: 20px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #1d4ed8; }

    hr { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Prediction Result</h1>

    <div class="img-wrap">
      <img src="{{ image_url }}" alt="Uploaded car">
    </div>

    <div class="result-block">
      <div class="predicted-label">Identified as</div>
      <div class="predicted-name">{{ result.class }}</div>
      <div class="confidence">Confidence: <strong>{{ result.confidence }}%</strong></div>
    </div>

    <hr>

    <div class="top3-title">Top Predictions</div>

    {% for name, prob in result.top3 %}
    <div class="bar-row">
      <div class="bar-meta">
        <span>{{ name }}</span>
        <span>{{ prob }}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width: {{ prob }}%;"></div>
      </div>
    </div>
    {% endfor %}

    <a href="/" class="back-btn">Classify Another</a>
  </div>

</body>
</html>
